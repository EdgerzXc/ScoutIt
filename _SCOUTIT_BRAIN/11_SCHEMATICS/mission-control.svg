<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>ScoutIT Mission Control schematic</title>
  <desc>Founder cockpit: supply flows in to The Gate (Approval Queue), only approved records reach the public site; six operating zones sit below, all linking to the PROPERTIES_CMS spine.</desc>
  <rect x="0" y="0" width="900" height="560" fill="#0e0e0e"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6" fill="none" stroke="#f0ede8" stroke-opacity="0.55" stroke-width="1.4"/>
    </marker>
  </defs>

  <!-- PULSE bar -->
  <rect x="30" y="20" width="840" height="40" rx="6" fill="none" stroke="#f0ede8" stroke-opacity="0.25"/>
  <text x="48" y="45" font-size="13" font-weight="700" fill="#f0ede8">A · PULSE</text>
  <text x="150" y="45" font-size="12" fill="#f0ede8" fill-opacity="0.75">Overview KPIs — live properties · inquiries · brokers · providers · open bounties</text>

  <!-- FLOW: supply -> gate -> public -->
  <rect x="30" y="92" width="225" height="72" rx="8" fill="none" stroke="#f0ede8" stroke-opacity="0.3"/>
  <text x="142" y="120" font-size="13" font-weight="700" text-anchor="middle" fill="#f0ede8">SUPPLY IN</text>
  <text x="142" y="139" font-size="10.5" text-anchor="middle" fill="#f0ede8" fill-opacity="0.7">Owner wizard · Concierge PDF</text>
  <text x="142" y="153" font-size="10.5" text-anchor="middle" fill="#f0ede8" fill-opacity="0.7">→ Supabase (pending)</text>

  <line x1="258" y1="128" x2="335" y2="128" stroke="#f0ede8" stroke-opacity="0.55" stroke-width="1.4" marker-end="url(#arrow)"/>

  <rect x="338" y="92" width="225" height="72" rx="8" fill="#ffb800" fill-opacity="0.08" stroke="#ffb800" stroke-opacity="0.9" stroke-width="1.6"/>
  <text x="450" y="120" font-size="13" font-weight="700" text-anchor="middle" fill="#f0ede8">B · THE GATE</text>
  <text x="450" y="139" font-size="10.5" text-anchor="middle" fill="#f0ede8" fill-opacity="0.75">Approval Queue</text>
  <text x="450" y="153" font-size="10.5" text-anchor="middle" fill="#f0ede8" fill-opacity="0.75">+ per-category review</text>

  <line x1="566" y1="128" x2="643" y2="128" stroke="#f0ede8" stroke-opacity="0.55" stroke-width="1.4" marker-end="url(#arrow)"/>

  <rect x="646" y="92" width="224" height="72" rx="8" fill="none" stroke="#f0ede8" stroke-opacity="0.3"/>
  <text x="758" y="120" font-size="13" font-weight="700" text-anchor="middle" fill="#f0ede8">PUBLIC SITE</text>
  <text x="758" y="139" font-size="10.5" text-anchor="middle" fill="#f0ede8" fill-opacity="0.7">api/cms serves</text>
  <text x="758" y="153" font-size="10.5" text-anchor="middle" fill="#f0ede8" fill-opacity="0.7">approved records only</text>

  <text x="450" y="190" font-size="11" font-style="italic" text-anchor="middle" fill="#f0ede8" fill-opacity="0.65">Gate rule: nothing goes public until its approval box is ticked.</text>
  <text x="450" y="224" font-size="11" text-anchor="middle" fill="#f0ede8" fill-opacity="0.55">▼  every zone below links to the PROPERTIES_CMS spine</text>

  <!-- ZONES -->
  <g font-size="10.5">
    <rect x="30" y="246" width="200" height="290" rx="8" fill="none" stroke="#f0ede8" stroke-opacity="0.25"/>
    <text x="46" y="272" font-size="12.5" font-weight="700" fill="#f0ede8">C · CONTENT</text>
    <text x="46" y="298" fill="#f0ede8" fill-opacity="0.75">L1 · The Board</text>
    <text x="46" y="318" fill="#f0ede8" fill-opacity="0.75">L2 · Categories</text>
    <text x="46" y="338" fill="#f0ede8" fill-opacity="0.75">L3 · Collections</text>
    <text x="46" y="358" fill="#f0ede8" fill-opacity="0.75">L3 · Intel Articles</text>
    <text x="46" y="378" fill="#f0ede8" fill-opacity="0.75">L6 · About</text>

    <rect x="244" y="246" width="200" height="290" rx="8" fill="none" stroke="#f0ede8" stroke-opacity="0.25"/>
    <text x="260" y="272" font-size="12.5" font-weight="700" fill="#f0ede8">D · ECOSYSTEM</text>
    <text x="260" y="298" fill="#f0ede8" fill-opacity="0.75">L4 · Brokers</text>
    <text x="260" y="318" fill="#f0ede8" fill-opacity="0.75">L4 · Service Providers</text>
    <text x="260" y="338" fill="#f0ede8" fill-opacity="0.75">L4 · Property–Brokers</text>
    <text x="260" y="356" fill="#f0ede8" fill-opacity="0.5">(the handshake)</text>

    <rect x="458" y="246" width="200" height="290" rx="8" fill="none" stroke="#f0ede8" stroke-opacity="0.25"/>
    <text x="474" y="272" font-size="12.5" font-weight="700" fill="#f0ede8">E · MONETIZATION</text>
    <text x="474" y="298" fill="#f0ede8" fill-opacity="0.75">Tiers (20)</text>
    <text x="474" y="318" fill="#f0ede8" fill-opacity="0.75">Feature Gates (40)</text>
    <text x="474" y="338" fill="#f0ede8" fill-opacity="0.75">Connect Costs</text>
    <text x="474" y="358" fill="#f0ede8" fill-opacity="0.75">Connect Packs</text>
    <text x="474" y="378" fill="#f0ede8" fill-opacity="0.75">Bounties</text>

    <rect x="672" y="246" width="198" height="290" rx="8" fill="none" stroke="#f0ede8" stroke-opacity="0.25"/>
    <text x="688" y="272" font-size="12.5" font-weight="700" fill="#f0ede8">F · CONFIG</text>
    <text x="688" y="298" fill="#f0ede8" fill-opacity="0.75">L5 · Reaction Tags</text>
    <text x="688" y="320" fill="#f0ede8" fill-opacity="0.45">Error / Reports (soon)</text>
    <text x="688" y="340" fill="#f0ede8" fill-opacity="0.45">QuestIT board (soon)</text>
  </g>
</svg>
