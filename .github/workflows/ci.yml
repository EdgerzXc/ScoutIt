name: CI

# Safety net: runs on every push and pull request. Checks the code lints, tests
# pass, and the app still builds — BEFORE anything reaches the live site.
# This workflow never deploys and holds no real secrets (build uses placeholders).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel older runs on the same branch when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (report-only, won't block)
        run: npm run lint || true

      - name: Unit tests (Vitest)
        run: npx vitest run

      - name: Build check
        # Placeholder env so `next build` doesn't fail on missing vars.
        # These are NOT real credentials — they only let the build compile.
        # Real values live in Vercel, never here.
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
          NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: "pk.placeholder"
          NEXT_PUBLIC_SITE_URL: "https://scout-it.vercel.app"
          AIRTABLE_API_KEY: "placeholder"
          AIRTABLE_BASE_ID: "appPlaceholder"
        run: npm run build
